{% extends "base.html" %}
{% block title %}{{ t('register_title') }}{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>{{ t('register_heading') }}</h2>
        {% if errors %}
        <div class="form-errors">
            {% for error in errors %}
            <p class="error-item">{{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ t('register_username') }}</label>
                <input type="text" id="username" name="username"
                       value="{{ username or '' }}" required autofocus minlength="2">
            </div>
            <div class="form-group">
                <label for="email">{{ t('register_email') }}</label>
                <input type="email" id="email" name="email"
                       value="{{ email or '' }}" required>
            </div>
            <div class="form-group">
                <label for="password">{{ t('register_password') }}</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="password2">{{ t('register_password2') }}</label>
                <input type="password" id="password2" name="password2" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block">{{ t('register_btn') }}</button>
        </form>
        <p class="auth-switch">
            {{ t('register_switch') }}<a href="/login">{{ t('register_switch_link') }}</a>
        </p>
    </div>
</div>
{% endblock %}
