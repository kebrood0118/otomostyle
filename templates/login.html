{% extends "base.html" %}
{% block title %}{{ t('login_title') }}{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>{{ t('login_heading') }}</h2>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ t('login_username') }}</label>
                <input type="text" id="username" name="username"
                       value="{{ username or '' }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">{{ t('login_password') }}</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">{{ t('login_btn') }}</button>
        </form>
        <p class="auth-switch">
            {{ t('login_switch') }}<a href="/register">{{ t('login_switch_link') }}</a>
        </p>
    </div>
</div>
{% endblock %}
